# Default config — OpenAI gpt-5.4-mini.
# Loaded automatically by `make run-text` / `make run-voice` unless overridden.
#
# Requires: OPENAI_API_KEY environment variable (or set apiKey below).

llm:
  baseURL: "https://api.openai.com/v1"
  model: "gpt-5.4-mini"
  # apiKey: "sk-..."   # alternatively set OPENAI_API_KEY env var
  temperature: 0.7
  maxTokens: 1024
  contextWindow: 128000

tts:
  enabled: false
  rate: 0.52
  pitchMultiplier: 1.0
  volume: 1.0

stt:
  enabled: true
  locale: "en-US"
  censor: false
