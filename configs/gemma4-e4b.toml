[llm]
# `hf:` spec — resolved and downloaded into the HuggingFace cache by the Rust
# model downloader, so this works from every frontend.
#
# gemma-4-E4B: the dense ~4B model, ~5.0GB on disk (Q4_K_M) — the small sibling
# of the 26B-A4B MoE in gemma4.toml, with the identical prompt format
# (docs/GEMMA4.md). Fits comfortably on CPU or a modest GPU.
modelPath = "hf:unsloth/gemma-4-E4B-it-GGUF/gemma-4-E4B-it-Q4_K_M.gguf"
# Local backend: "llamacpp" (default) or "gallium" (native candle). gallium
# needs a tokenizer.json, which this GGUF repo omits, so also set
# KESSEL_GALLIUM_TOKENIZER_REPO=unsloth/gemma-4-E4B-it.
inferenceEngine = "llamacpp"
temperature = 0.7
maxTokens = 4096

[agent]
# Gemma 4 does support a system role, and its template declares tools natively
# (`<|tool>` / `<|tool_call>`), which llm_local.rs renders and parses. See
# docs/GEMMA4.md.
systemPromptPath = "system-prompt.md"   # Path to system prompt file (relative to config dir)
maxTurns = 50
skillPaths = ["../skills"]              # SKILL.md dirs (relative to this config's dir)
