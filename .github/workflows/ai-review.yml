# AI-reviews this repo's PRs by calling the reusable workflow in fpt/klein-cli.
#
# Trust model: `on: pull_request` (NOT pull_request_target) and the job is
# gated to same-repository branches, so the API-key secret is only exposed to
# code from contributors who already have push access. Fork PRs get no secrets
# and are skipped.
name: AI Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    # Skip fork PRs: they must not receive the secret.
    if: github.event.pull_request.head.repo.full_name == github.repository
    uses: fpt/klein-cli/.github/workflows/ai-review-reusable.yml@main
    secrets:
      openai-api-key: ${{ secrets.OPENAI_API_KEY }}
